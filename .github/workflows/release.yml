name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-musl
          strip target/x86_64-unknown-linux-musl/release/herdr-insight

      - name: Create tarball
        run: |
          mkdir -p dist
          tar -czf dist/herdr-insight-linux-x86_64.tar.gz \
            -C target/x86_64-unknown-linux-musl/release herdr-insight

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/herdr-insight-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/herdr-insight

      - name: Create tarball
        run: |
          mkdir -p dist
          tar -czf dist/herdr-insight-macos-${{ matrix.arch }}.tar.gz \
            -C target/${{ matrix.target }}/release herdr-insight

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/herdr-insight-macos-${{ matrix.arch }}.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f -name '*.tar.gz' | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc.') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
